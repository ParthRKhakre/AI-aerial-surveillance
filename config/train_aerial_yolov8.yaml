# Ultralytics YOLO training configuration for aerial datasets
model: yolov8m.pt
data: config/aerial_data.yaml
epochs: 120
imgsz: 960
batch: 8
device: 0
optimizer: AdamW
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 5.0
translate: 0.1
scale: 0.5
shear: 2.0
perspective: 0.0005
flipud: 0.5
fliplr: 0.5
mosaic: 1.0
mixup: 0.1
close_mosaic: 15
cache: ram
workers: 8
patience: 30
